<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Post — Eros Ye</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body onload="loadBlogPost()">
<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="/" class="nav-logo">Eros Ye<span class="dot">.</span></a>
    <div class="nav-links" id="navLinks">
      <a href="/" class="nav-link">Home</a>
      <a href="/about.html" class="nav-link">About</a>
      <a href="/blog.html" class="nav-link active">Blog</a>
      <a href="/research.html" class="nav-link">Research</a>
      <a href="/speaking.html" class="nav-link">Speaking</a>
      <a href="/contact.html" class="nav-link">Contact</a>
    </div>
    <div class="nav-actions">
      <button class="lang-toggle" onclick="toggleLang()">中</button>
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
    </div>
  </div>
</nav>

<section class="page-header">
  <div class="container">
    <div class="article-meta" style="justify-content: center;">
      <span class="article-pillar-badge" id="postPillar"></span>
      <span id="postDate"></span>
      <span id="postReadTime"></span>
    </div>
    <h1 id="postTitle" style="max-width: 720px; margin: 16px auto 0;"></h1>
  </div>
</section>

<article class="article section">
  <div class="container">
    <div id="postContent">
      <!-- 文章内容由JS动态加载 -->
      <p style="text-align: center; color: var(--text-muted);">Loading article...</p>
    </div>
    <div class="article-footer">
      <div class="article-tags" id="postTags"></div>
    </div>
  </div>
</article>

<footer class="footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <div class="footer-logo">Eros Ye<span class="dot">.</span></div>
        <p>Bridging East & West in FinTech Leadership</p>
      </div>
      <div class="footer-links">
        <h4>Navigate</h4>
        <a href="/">Home</a><a href="/about.html">About</a><a href="/blog.html">Blog</a><a href="/research.html">Research</a><a href="/speaking.html">Speaking</a>
      </div>
      <div class="footer-links">
        <h4>Connect</h4>
        <a href="#">LinkedIn</a><a href="#">微信公众号</a><a href="#">Medium</a><a href="#">Twitter/X</a>
      </div>
      <div class="footer-links">
        <h4>Content</h4>
        <a href="/blog.html?pillar=practice">实战复盘</a><a href="/blog.html?pillar=academic">学术洞察</a><a href="/blog.html?pillar=eastwest">东西对话</a><a href="/blog.html?pillar=opinion">观点立场</a>
      </div>
    </div>
    <div class="footer-bottom"><p>&copy; 2025 Eros Ye. All rights reserved.</p></div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
