<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Eros Ye 叶明希 — Thinking about AI, teams, and the space between East and West.">
<title>Eros Ye</title>
<style>
  :root {
    --bg: #fafaf8;
    --text: #1a1a1a;
    --text-secondary: #555;
    --text-muted: #999;
    --border: #e5e5e0;
    --code-bg: #f3f3f0;
    --link: #1a1a1a;
    --link-hover: #555;
    --accent: #d4a853;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --text: #e0e0dc;
      --text-secondary: #999;
      --text-muted: #666;
      --border: #2a2a28;
      --code-bg: #1a1a18;
      --link: #e0e0dc;
      --link-hover: #aaa;
    }
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Courier New', 'Noto Sans SC', monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* === 顶部 === */
  .site-header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .site-header h1 {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }
  .site-header h1 span { color: var(--accent); }
  .site-header .tagline {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .site-header nav {
    margin-top: 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .site-header nav a {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .site-header nav a:hover, .site-header nav a.active { color: var(--text); }

  /* === 文章列表 === */
  .post-item {
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
  }
  .post-item .post-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .post-item .post-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    text-decoration: none;
    margin-bottom: 6px;
    display: block;
    line-height: 1.5;
  }
  .post-item .post-title:hover { color: var(--link-hover); }
  .post-item .post-excerpt {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .post-item .post-tags {
    margin-top: 8px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .post-item .post-tags span {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--code-bg);
    padding: 2px 8px;
    border-radius: 3px;
  }

  /* === 文章详情页 === */
  .article { padding: 20px 0; }
  .article h1 {
    font-size: 22px; font-weight: 500; margin: 0 0 8px 0;
    line-height: 1.4;
  }
  .article .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 32px; }
  .article .body { font-size: 15px; color: var(--text-secondary); line-height: 2; }
  .article .body p { margin-bottom: 20px; }
  .article .body h2 {
    font-size: 17px; font-weight: 500; color: var(--text);
    margin: 36px 0 12px;
  }
  .article .body h3 {
    font-size: 15px; font-weight: 500; color: var(--text);
    margin: 24px 0 8px;
  }
  .article .body blockquote {
    border-left: 2px solid var(--accent);
    padding: 4px 0 4px 16px;
    margin: 20px 0;
    color: var(--text-secondary);
    font-style: italic;
  }
  .article .body ul, .article .body ol {
    padding-left: 20px;
    margin-bottom: 20px;
  }
  .article .body li { margin-bottom: 6px; }
  .article .body code {
    background: var(--code-bg);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 13px;
  }
  .article .body pre {
    background: var(--code-bg);
    padding: 16px;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 13px;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .article .body strong { color: var(--text); font-weight: 600; }

  /* === 关于页 === */
  .about-section { margin-bottom: 40px; }
  .about-section h2 {
    font-size: 16px; font-weight: 500; margin-bottom: 16px;
    color: var(--text);
  }
  .about-section p {
    font-size: 14px; color: var(--text-secondary);
    line-height: 1.9; margin-bottom: 12px;
  }
  .about-section ul { padding-left: 16px; margin-bottom: 12px; }
  .about-section li { font-size: 14px; color: var(--text-secondary); margin-bottom: 6px; }

  .timeline-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
  }
  .timeline-item .year {
    font-size: 11px; color: var(--text-muted);
    min-width: 80px; padding-top: 2px;
  }
  .timeline-item .desc { font-size: 13px; color: var(--text-secondary); }
  .timeline-item .desc strong { color: var(--text); font-weight: 500; }

  /* === 联系页 === */
  .contact-link {
    display: block;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }
  .contact-link:hover { color: var(--accent); }
  .contact-link span { color: var(--text-muted); font-size: 12px; }

  /* === 页脚 === */
  .site-footer {
    margin-top: 60px;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
  }

  /* === 响应式 === */
  @media (max-width: 480px) {
    body { font-size: 14px; padding: 0 16px 60px; }
    .site-header { padding: 40px 0 28px; }
    .site-header h1 { font-size: 16px; }
    .article h1 { font-size: 19px; }
    .article .body { font-size: 14px; }
  }

  /* === 暗色模式切换 === */
  .theme-toggle {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer;
    padding: 4px 10px; font-size: 11px;
    border-radius: 4px; font-family: inherit;
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>Eros Ye <span>叶明希</span></h1>
  <p class="tagline">
    Thinking about AI, teams, and the space between East and West.<br>
    研究 AI 与团队，思考东西方的交汇。
  </p>
  <nav>
    <a href="/erosye/" class="active">Writing</a>
    <a href="/erosye/about">About</a>
    <a href="/erosye/contact">Contact</a>
  </nav>
</header>

<main id="content">
  <!-- JS 动态渲染 -->
</main>

<footer class="site-footer">
  &copy; 2025 Eros Ye · Built with plain text and curiosity.
</footer>

<script>
// ============ 路由 ============
const SITE_BASE = '/erosye';

function route() {
  const path = window.location.pathname.replace(SITE_BASE, '') || '/';
  const main = document.getElementById('content');

  if (path === '/' || path === '') {
    main.innerHTML = renderPostList();
  } else if (path === '/about') {
    main.innerHTML = renderAbout();
  } else if (path === '/contact') {
    main.innerHTML = renderContact();
  } else if (path.startsWith('/post/')) {
    const id = path.split('/post/')[1];
    main.innerHTML = renderPost(id);
  } else {
    main.innerHTML = '<p style="color:var(--text-muted);padding:40px 0;">404 — Page not found.</p>';
  }

  // 导航高亮
  document.querySelectorAll('nav a').forEach(a => {
    const href = a.getAttribute('href').replace(SITE_BASE, '');
    a.classList.toggle('active', href === path || (path === '/' && href === '/'));
  });
}

// ============ 文章数据 ============
const POSTS = [
  {
    {
    id: 'ai-entering-teams',
    title: 'AI 正在走进团队，但我们真的准备好了吗？',
    date: '2025-07-16',
    excerpt: 'KPMG 的报告说要把 AI 当员工管理。但真正的问题不是「怎么管 AI」，而是「当 AI 坐在团队里，人和人的协作方式会发生什么改变」。一个故事，一个发现，一个启示。',
    tags: ['AI', '团队', '管理'],
    body: `
<p>上个月的一个周三下午，我在一个项目回顾会上听到这样一句话。</p>

<p>团队刚完成一个核心模块的交付。项目经理在复盘时说：「这次我们比计划提前了两周。」我问原因，技术负责人想了想说：「Copilot 帮了很大的忙。但不是你想的那种——不是每个人写得快了。是那几个经验最丰富的工程师，用 AI 的方式和我们预期的不太一样。」</p>

<p>这句话让我想了很久。</p>

<p>正好最近 KPMG 发了一份报告，讨论 AI Agent 应该被视为「数字员工」纳入组织架构。报告里有些值得思考的框架。但读完以后，我总觉得少了点什么——少了那个技术负责人在会议室里说的那种东西：<strong>真正发生在团队里的、微妙的、不那么整齐的变化。</strong></p>

<h2>先讲一个案例</h2>

<p>2024 年，摩根士丹利给财务顾问团队部署了一个 AI 工具。功能听起来不复杂——客户通话后，AI 自动生成会议纪要、提取行动事项、同步到 CRM 系统。</p>

<p>但有个数字让我印象深刻：<strong>98% 的顾问自愿采用了这个工具。</strong></p>

<p>做过企业软件部署的人都知道这意味着什么——大部分企业内部工具的采用率能超过 60% 就算成功了。摩根士丹利的顾问们不是被要求用的，他们是<strong>自己选择用</strong>的。</p>

<p>为什么？因为 AI 帮他们省掉了最无聊的那部分工作——花 20 分钟回忆通话内容、整理笔记、录入系统。而顾问们可以把精力放在真正有价值的事情上：理解客户需求、思考投资策略、维护信任关系。</p>

<h2>资深者的秘密</h2>

<p>我在实际数据中也看到了类似的规律。</p>

<p>在一次大规模的 AI 工具部署中，我追踪了团队里不同成员的使用效果。结果很有意思：<strong>资深开发者在 AI 上的生产力提升，明显大于初级开发者。</strong></p>

<p>一开始我觉得这有点反直觉——难道不是新人更需要 AI 帮忙吗？</p>

<p>后来我和几位资深工程师聊了聊，发现了一个有趣的模式。一个工作了十几年的工程师告诉我：「我用 AI 不是让它替我写代码。我是让它帮我处理那些我已经知道怎么写、但写起来很花时间的部分。这样我就能把精力花在那些真正需要判断力的地方——架构该怎么设计，边界条件该怎么处理。」</p>

<p>而初级开发者的情况不同。他们往往让 AI 直接生成大段代码，然后花更多时间去理解和调试。AI 确实帮了他们，但帮的方式不一样。</p>

<p>这让我想起一个经典的经济学概念：「技术-技能互补」。新技术往往不是替代高技能劳动者，而是和他们的能力形成互补，放大他们已经具备的优势。<strong>AI 也是如此——不是均衡器，是放大器。</strong></p>

<p>如果你是管理者，这个发现有一个直接的启示：不要假设 AI 会让团队变得更平等。它可能会让强者更强。如何不让能力差距因此拉大，才是真正需要思考的问题。</p>

<p>我写这篇文章的时候，一直在想那个会议室里的技术负责人。他说的那句话我到现在还记得：「他们用 AI 的方式和我们预期的不太一样。」</p>

<p>也许这就是 AI 进入团队之后，最值得关注的事情——不是 AI 本身有多强大，而是人如何使用它、如何互相学习、如何在新的工具面前重新定义协作的方式。</p>
`
  },
  {
    id: 'timezone-ai-boundary',
    title: 'AI 溶解了时区，但没有溶解文化',
    date: '2025-09-03',
    excerpt: '基于 7,439 个团队、75,945 名开发者的实证研究发现：AI 让跨时区协作更高效，但对空间距离和团队信任没有任何缓解作用。AI 是异步协作增强器，不是文化粘合剂。',
    tags: ['AI', '远程协作', '团队', '研究'],
    body: `<p>即将发布。基于 ICIS 2025 发表的 TimeZone 论文核心发现。</p>`
  },
  {
    id: 'seniority-ai-complementarity',
    title: 'AI 不是均衡器，是放大器',
    date: '2025-07-20',
    excerpt: '一项对 743 名开发者的实证研究颠覆了「AI 让新人追上老人」的假设。数据表明：资深者的 AI 生产力提升远大于初级者——AI 放大已有的能力差距。这对企业人才策略有重大启示。',
    tags: ['AI', '人才', '研究'],
    body: `<p>即将发布。基于 ICIS 2025 发表的 Seniority & Spillovers 论文核心发现。</p>`
  },
];

function renderPostList() {
  return POSTS.map(p => `
    <div class="post-item">
      <div class="post-date">${p.date}</div>
      <a class="post-title" href="${SITE_BASE}/post/${p.id}" onclick="navigate(event,'/post/${p.id}')">${p.title}</a>
      <p class="post-excerpt">${p.excerpt}</p>
      <div class="post-tags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function renderPost(id) {
  const p = POSTS.find(p => p.id === id);
  if (!p) return '<p style="color:var(--text-muted);padding:40px 0;">Post not found.</p>';

  document.title = `${p.title} — Eros Ye`;

  return `
    <article class="article">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">
        <a href="${SITE_BASE}/" onclick="navigate(event,'/')" style="color:var(--text-muted);text-decoration:none;">← Writing</a>
      </p>
      <h1>${p.title}</h1>
      <div class="meta">${p.date} · ${p.tags.join(' · ')}</div>
      <div class="body">${p.body}</div>
    </article>
  `;
}

function renderAbout() {
  document.title = 'About — Eros Ye';
  return `
    <div class="about-section">
      <p>Hey, I'm Eros (叶明希).</p>
      <p>I spend my days thinking about two things: <strong>how AI changes the way teams work</strong>, and <strong>what happens when Eastern and Western approaches to technology collide</strong>.</p>
      <p>By day, I lead technology operations for a global financial institution — the kind of job where you learn that culture eats strategy for breakfast, and that the hardest problems in tech are never actually about tech.</p>
      <p>By night (and weekends, and early mornings), I'm a DBA researcher at City University of Hong Kong. I run large-scale empirical studies on real enterprise data to answer questions like: <em>Who actually benefits from AI tools? Does AI make teams more equal, or less? Can code-generation AI dissolve time zones?</em></p>
      <p>Some of that work has been published at top conferences like ICIS. Most of it is still in progress — which is exactly where it should be.</p>
    </div>

    <div class="about-section">
      <h2>What I Care About</h2>
      <ul>
        <li>The gap between what AI research claims and what actually happens when you deploy it to thousands of people</li>
        <li>Why Chinese and Western tech cultures misunderstand each other — and how to fix that</li>
        <li>Building things that last: teams, systems, ideas</li>
        <li>Writing that doesn't sound like a corporate press release</li>
      </ul>
    </div>

    <div class="about-section">
      <h2>Elsewhere</h2>
      <p>
        <a href="https://linkedin.com/in/erosye" style="color:var(--text);">LinkedIn</a> &nbsp;·&nbsp;
        <a href="https://github.com/Eros0724" style="color:var(--text);">GitHub</a> &nbsp;·&nbsp;
        <a href="mailto:eros.ye@icloud.com" style="color:var(--text);">Email</a>
      </p>
    </div>
  `;
}

function renderContact() {
  document.title = 'Contact — Eros Ye';
  return `
    <div class="about-section">
      <p>If something I wrote resonated, or you want to chat about AI, teams, or the East-West intersection — I'd love to hear from you.</p>
      <p>The best way to reach me is email. I read everything, though I can't always reply quickly.</p>
    </div>
    <a class="contact-link" href="mailto:eros.ye@icloud.com">Email <span>— eros.ye@icloud.com</span></a>
    <a class="contact-link" href="https://www.linkedin.com/in/erosye">LinkedIn <span>— Eros Ye 叶明希</span></a>
    <a class="contact-link" href="#">微信公众号 <span>— AI时代的管理者思考（即将上线）</span></a>
    <a class="contact-link" href="#">微信 <span>— erosye（备注来意）</span></a>
    <a class="contact-link" href="https://github.com/Eros0724">GitHub <span>— Open source and projects</span></a>
  `;
}

function navigate(e, path) {
  e.preventDefault();
  history.pushState(null, '', SITE_BASE + path);
  route();
}

window.addEventListener('popstate', route);
route();
</script>
</body>
</html>
